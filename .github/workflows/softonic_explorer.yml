name: Softonic Explorer Test

on:
  workflow_dispatch:
    inputs:
      app_slug:
        description: 'Softonic App Slug (e.g. egg-bus-train-in-israel)'
        required: true
        default: 'egg-bus-train-in-israel'

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # התקנת ספריית השליטה בדפדפן והורדת דפדפן כרום
      - name: Install Playwright
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium

      - name: Create Python Script
        run: |
          cat << 'EOF' > softonic_explorer.py
          import time
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          import sys
          import os

          def explore_softonic(softonic_id):
              print(f"[*] Starting Softonic exploration for: {softonic_id} (using Playwright / Real Chrome)")
              
              app_url = f"https://{softonic_id}.en.softonic.com/android"
              download_page = f"{app_url}/download"

              with sync_playwright() as p:
                  # פתיחת דפדפן מוסתר
                  browser = p.chromium.launch(headless=True)
                  context = browser.new_context(
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36",
                      viewport={'width': 1920, 'height': 1080}
                  )
                  page = context.new_page()

                  print(f"[*] Navigating to Main Page: {app_url}")
                  try:
                      # גלישה לעמוד והמתנה שהרשת תהיה שקטה (כלומר שכל ה-JS סיים לטעון)
                      response = page.goto(app_url, wait_until="networkidle", timeout=30000)
                      print(f"[+] Response status: {response.status}")
                      
                      html = page.content()
                      with open("softonic_app_page.html", "w", encoding="utf-8") as f:
                          f.write(html)
                          
                      soup = BeautifulSoup(html, "html.parser")
                      
                      title = soup.find("h1")
                      print(f"[+] Title found: {title.text.strip() if title else 'Not found'}")
                      
                      print("[*] Searching for Version info:")
                      for li in soup.find_all("li"):
                          text = li.text.strip()
                          if "Version" in text or "10." in text:
                              print(f"    -> Potential version block: {text.replace(chr(10), ' ')}")
                              
                  except Exception as e:
                      print(f"[-] Error on main page: {e}")

                  print("\n[*] Navigating to Download Page...")
                  try:
                      response = page.goto(download_page, wait_until="networkidle", timeout=30000)
                      print(f"[+] Response status: {response.status}")
                      
                      html2 = page.content()
                      with open("softonic_download_page.html", "w", encoding="utf-8") as f:
                          f.write(html2)
                          
                      soup2 = BeautifulSoup(html2, "html.parser")
                      
                      print("[*] Searching for Direct Download Links in the DOM...")
                      
                      btn = soup2.find(id="download-button")
                      if btn and btn.has_attr("href"):
                          print(f"    [!] Found id='download-button' -> {btn['href']}")
                          
                      print("\n[*] Other potential download links found:")
                      for a in soup2.find_all("a", href=True):
                          href = a.get('href', '')
                          if ".apk" in href or ".xapk" in href or "ext.softonic.com" in href or "download" in href:
                              if "articles" not in href and "windows" not in href and "mac" not in href:
                                  print(f"    -> {href}")
                                  
                  except Exception as e:
                      print(f"[-] Error on download page: {e}")

                  browser.close()

          if __name__ == "__main__":
              app_slug = os.environ.get("APP_SLUG", "egg-bus-train-in-israel")
              explore_softonic(app_slug)
          EOF

      - name: Run Softonic Explorer
        env:
          APP_SLUG: ${{ github.event.inputs.app_slug }}
        run: python softonic_explorer.py
        
      - name: Upload Softonic HTML Dumps
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: softonic-html-dumps
          path: softonic_*.html
          retention-days: 3
